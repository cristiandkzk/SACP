name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: core tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  example:
    name: example typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build core (the example depends on it)
        working-directory: packages/core
        run: npm install && npm run build
      - name: Typecheck the Claude adapter example
        working-directory: examples/anthropic-adapter
        run: npm install && npm run build
